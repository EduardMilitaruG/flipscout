# FlipScout — configuration
# Secrets (tokens, session cookies) must be set in .env, never here.

# ── Keywords & categories ──────────────────────────────────────────────────────
# Format: each keyword is a plain string; category is auto-detected.
# You can also add category hints: {keyword: "...", category: "fashion"}

keywords:
  # Fashion — archive Japanese brands
  - "undercover jacket"
  - "undercover ss"
  - "number nine denim"
  - "number nine jacket"
  - "kapital"
  - "issey miyake pleats please"
  - "yohji yamamoto"
  - "comme des garcons homme plus"
  - "jungle jap"
  - "beauty:beast"
  # Tech
  - "iphone 13 pro"
  - "iphone 14 pro"
  - "sony wh-1000xm5"
  - "ps5 slim"
  - "nintendo switch oled"
  # Pokemon
  - "psa 10 charizard"
  - "psa 9 pikachu holo"
  - "1st edition base set"

# Maximum listing price to even consider (USD)
max_price_usd: 500

# Alert if listing is this many percent below Japanese market value
deal_threshold_pct: 30

# Minimum gross profit margin % to trigger an enriched margin alert
min_margin_pct: 15

# How often to run the main scraper (minutes)
check_interval_minutes: 15

# Pages to scrape per keyword (each page ≈ 48 results)
max_pages: 2

# Marketplaces to scrape (zenmarket | mercari_jp)
marketplaces:
  - zenmarket
  - mercari_jp

# Terms that immediately disqualify a listing (case-insensitive)
exclude_terms:
  - replica
  - fake
  - inspired by
  - bootleg
  - copy
  - repro
  - "not authentic"

# ── Market values (USD) ────────────────────────────────────────────────────────
# Conservative Western-resale estimates for deal scoring.
# Update these based on your own research.

market_values:
  "undercover jacket":            480
  "undercover ss":                420
  "number nine denim":            390
  "number nine jacket":           450
  "kapital":                      260
  "issey miyake pleats please":   180
  "yohji yamamoto":               550
  "comme des garcons homme plus": 620
  "jungle jap":                   300
  "beauty:beast":                 340
  "iphone 13 pro":                400
  "iphone 14 pro":                500
  "sony wh-1000xm5":              200
  "ps5 slim":                     350
  "nintendo switch oled":         280
  "psa 10 charizard":             1200
  "psa 9 pikachu holo":           800
  "1st edition base set":         2000

# ── Shipping cost tiers (Japan → Spain, EMS) ──────────────────────────────────
# All values in JPY. Update annually as Japan Post rates change.

shipping:
  zenmarket_service_fee_jpy: 500
  domestic_japan_shipping_jpy: 900
  risky_shipping_ratio: 0.40    # Flag if shipping > 40% of gross margin

  ems_tiers_jpy:
    - max_g: 500
      cost_jpy: 2800
    - max_g: 1000
      cost_jpy: 3800
    - max_g: 2000
      cost_jpy: 5400
    - max_g: 5000
      cost_jpy: 8000
    - max_g: 10000
      cost_jpy: 12000

  default_weights_g:
    pokemon_raw:   5
    pokemon_slab:  70
    tech:          300
    fashion:       500
    general:       400

# ── Fashion size conversion (Japanese → EU) ────────────────────────────────────
# Update if you work with different brand sizing conventions.

size_conversion:
  jp_to_eu_letter:
    XS: XS
    S:  XS
    M:  S
    L:  M
    XL: L
    XXL: XL
  jp_to_eu_numeric:
    "34": XS
    "36": XS
    "38": S
    "40": S
    "42": M
    "44": M
    "46": L
    "48": L
    "50": XL
    "52": XL

# ── Sniper targets (also manageable via bot commands) ─────────────────────────
# Targets defined here are loaded on startup if not already in the database.
# Manage active targets via /snipe commands in Telegram or Discord.

snipe_targets: []
