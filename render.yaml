services:
  - type: web
    name: flipscout-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed_demo.py
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
